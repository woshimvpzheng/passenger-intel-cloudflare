name = "passenger-intel-cloudflare"
main = "worker/index.mjs"
compatibility_date = "2026-06-06"
compatibility_flags = ["nodejs_compat"]

assets = { directory = "./web", binding = "ASSETS" }

kv_namespaces = [
  { binding = "PASSENGER_STATE", id = "REPLACE_WITH_KV_NAMESPACE_ID" }
]

[triggers]
crons = ["0 23,1,3,5,7,9 * * *"]
